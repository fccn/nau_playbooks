# This playbook is used to backup the data of the different databases of NAU service.
#
# It will backup:
# 1. MongoDB Cluster
# 2. Richie MySQL DB Cluster
# 3. Percona XtraDB Cluster
# 4. Financial Manager MySQL DB Cluster
# 5. NAU Analytics MySQL DB Cluster
#
# The backup of the Percona XtraDB Cluster is done with Percona XtraBackup,
# which is a tool that allows to backup the data of a MySQL database without locking
# the tables and without stopping the database.
#
# By default the backup is run on the last database server defined in the inventory.
# On Percona XtraDB Cluster, the backup is run on the last server defined in the inventory, which should be least load server.
#
# Examples:
#   ansible-playbook -i nau-data/envs/<env>/hosts.ini backup.yml --limit xtradb_servers
#   ansible-playbook -i nau-data/envs/<env>/hosts.ini backup.yml --limit richie_mysql_docker_servers
#   ansible-playbook -i nau-data/envs/<env>/hosts.ini backup.yml --limit mongo_docker_servers
#   ansible-playbook -i nau-data/envs/<env>/hosts.ini backup.yml --limit financial_manager_mysql_docker_servers
#   ansible-playbook -i nau-data/envs/<env>/hosts.ini backup.yml --limit nau_analytics_mysql_docker_servers
#
---
- name: Backup of Mongo data
  # by default run the backup on the last mongo instance defined in the inventory
  hosts: mongo_docker_servers[-1]
  become: True
  gather_facts: True
  tasks:
    - debug:
        msg: Backing up OpenEdx MongoDB
      when: backup_mongo | default(true)

    - import_role:
        name: backups
      vars:
        backup_mongo: True
      when: backup_mongo | default(true) | bool

- name: Backup Richie Mysql data
  # by default run the backup on the instance that should be a read replica
  hosts: richie_mysql_docker_servers[-1]
  become: True
  gather_facts: True
  tasks:
    - debug:
        msg: Backing up Richie Mysql Database
      when: backup_richie_mysql | default(true)

    - name: Backup Richie Mysql Database
      import_role:
        name: backups
      vars:
        richie_backup_mysql_container_name: richie_mysql
        richie_backup_mysql_login_user: root
        richie_backup_mysql_login_password: "{{ richie_MYSQL_ROOT_PASSWORD }}"
        richie_backup_mysql_port: 

        backup_mysql: True
        backup_mysql_container_name: "{{ richie_backup_mysql_container_name }}"
        backup_mysql_login_user: "{{ richie_backup_mysql_login_user }}"
        backup_mysql_login_password: "{{ richie_backup_mysql_login_password }}"
        backup_mysql_port: "{{ richie_mysql_docker_port }}"
      when: backup_richie_mysql | default(true) | bool

- name: Backup Percona XtraDB Cluster with Percona XtraBackup
  hosts: xtradb_servers[-1]
  become: True
  gather_facts: True
  tasks:
    - name: Backup Percona XtraDB Cluster Database
      import_role:
        name: percona_xtrabackup
      vars:
        backup_mysql_login_user: root
        backup_mysql_login_password: "{{ xtradb_mysql_root_password }}"

- name: Backup Financial Manager Mysql data
  # by default run the backup on the instance that should be a read replica
  hosts: financial_manager_mysql_docker_servers[-1]
  become: True
  gather_facts: True
  tasks:
    - debug:
        msg: Backing up Financial Manager Mysql Database
      when: backup_financial_manager_mysql | default(true)

    - name: Backup Financial Manager Mysql Database
      import_role:
        name: backups
      vars:
        backup_mysql: True
        backup_mysql_container_name: financial_manager_mysql
        backup_mysql_login_user: root
        backup_mysql_login_password: financial_manager_mysql_root_password
        backup_mysql_port: "{{ financial_manager_mysql_docker_port }}"
      when: backup_financial_manager_mysql | default(true) | bool

- name: Backup NAU Analytics Mysql data
  # by default run the backup on the instance that should be a read replica
  hosts: nau_analytics_mysql_docker_servers[-1]
  become: True
  gather_facts: True
  tasks:
    - debug:
        msg: Backing up NAU Analytics Mysql Database
      when: backup_nau_analytics_mysql | default(true)

    - name: Backup NAU Analytics Mysql Database
      import_role:
        name: backups
      vars:
        backup_mysql: True
        backup_mysql_container_name: nau_analytics_mysql
        backup_mysql_login_user: root
        backup_mysql_login_password: "{{ nau_analytics_mysql_root_password }}"
        backup_mysql_port: "{{ nau_analytics_mysql_docker_port | default(3306) }}"
      when: backup_nau_analytics_mysql | default(true) | bool
